<!DOCTYPE html>
<html>
<head>
  <title>Sree Yagna Saree Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="hero">
  <div class="hero-overlay">
    <h1>SreeYagnaCollections</h1>
    <p>Handcrafted Art for Every Wear</p>
    <a href="#products" class="shop-btn">Shop Now</a>
  </div>
</header>

<section id="products" class="products">

  <div class="product">
    <img src="images/saree1.jpg" alt="Saree">

    <p>₹2499</p>
    <button onclick="addToCart('Kanjivaram Silk Saree', 2499)">Add to Cart</button>
  </div>

  <div class="product">
    <img src="images/saree2.jpg" alt="Saree">
    <h3>Banarasi Saree</h3>
    <p>₹1999</p>
    <button onclick="addToCart('Banarasi Saree', 1999)">Add to Cart</button>
  </div>

</section>

<script src="js/script.js"></script>
</body>
</html>
